apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wger-postgres-pvc
  namespace: wger
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: wger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: wger
            - name: POSTGRES_USER
              value: wger
            - name: POSTGRES_PASSWORD
              value: wger
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: wger-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: wger
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
