apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wger-media-pvc
  namespace: wger
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wger
  namespace: wger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wger
  template:
    metadata:
      labels:
        app: wger
    spec:
      containers:
        - name: wger
          image: docker.io/wger/server:latest
          env:
            - name: DJANGO_DEBUG
              value: "True"
            - name: WGER_SETTINGS_STATIC_ROOT
              value: "/home/wger/static"
            - name: DJANGO_PERFORM_MIGRATIONS
              value: "True"
            - name: STATIC_ROOT
              value: "/home/wger/static"
            - name: DJANGO_STATIC_URL
              value: "/static/"
            - name: DJANGO_MEDIA_URL
              value: "/media/"
            - name: DJANGO_DB_ENGINE
              value: django.db.backends.postgresql
            - name: DJANGO_DB_DATABASE
              value: wger
            - name: DJANGO_DB_USER
              value: wger
            - name: DJANGO_DB_PASSWORD
              value: wger
            - name: DJANGO_DB_HOST
              value: postgres
            - name: DJANGO_DB_PORT
              value: "5432"
            - name: DJANGO_CACHE_BACKEND
              value: django_redis.cache.RedisCache
            - name: DJANGO_CACHE_LOCATION
              value: redis://redis:6379/1
            - name: DJANGO_CACHE_TIMEOUT
              value: "1296000"
            - name: DJANGO_CACHE_CLIENT_CLASS
              value: django_redis.client.DefaultClient
            - name: CELERY_BROKER
              value: redis://redis:6379/2
            - name: CELERY_BACKEND
              value: redis://redis:6379/2
            - name: SITE_URL
              value: "http://192.168.0.241:32037"
            - name: PORT
              value: "80"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: media
              mountPath: /home/wger/media
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: wger-media-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: wger-svc
  namespace: wger
spec:
  type: NodePort
  selector:
    app: wger
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 32037
